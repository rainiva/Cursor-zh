name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run test suite
        shell: pwsh
        run: npm test

      - name: Enforce TDD pairing on pull requests
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          node scripts/tool/tdd-gate-cli.js
        env:
          TDD_GATE_BASE: ${{ github.event.pull_request.base.sha }}

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scripts = Get-ChildItem .\scripts -Filter *.ps1
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              throw "PowerShell parse failed: $($script.Name)`n$($errors | Out-String)"
            }
          }
